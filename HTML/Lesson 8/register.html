<!DOCTYPE html>
<html lang="en">
    
    <head>

        <meta charset="UTF-8">
        <title>Register</title>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="styles.css">

    </head>

    <body>

        <header>

            <h1 class="logo">Strode Swimming & Fitness</h1>

            <nav>

                <ul>

                    <li><a href="index.html">Homepage</a></li>
                    <li><a href="register.html">Register</a></li>
                    <li><a href="login.html">Login</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="timetable.html">Timetable</a></li>

                </ul>

            </nav>

        </header>

        <div class="register">

            <div class="register-image">

                <img src="images/register design.png" class="register-image-1">

            </div>

            <div class="register-details">

                <p class="line-1">Register</p>

                <p><br><br</p>

                <label for firstname>Firstname: </label>
                <input type="text" id="firstname" name="firstname" class="text-box">

                <p><br><br</p>

                <label for lastname>Lastname: </label>
                <input type="text" id="lastname" name="lastname" class="text-box">

                <p><br><br</p>

                <div class="email">
                
                    <label for email>Email: </label>
                    <input type="text" id="email" name="email" class="text-box">
                    <p><br><br</p>

                </div>

                <div class="password">

                    <label for password>Password: </label>
                    <input type="text" id="password" name="password" class="text-box">
                    <p><br><br</p>

                </div>

                <div class="password-confirm">

                    <label for password>Confirm Password: </label>
                    <input type="text" id="password-confirm" name="password-confirm" class="text-box">
                    <p><br><br</p>

                </div>

                    <a href="login.html" class="confirm-button">Confirm</a>


            </div>

            
            

        </div>
    </body>
</html>
